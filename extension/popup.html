<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credify - TLP</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- ── Header ── -->
        <div class="header">
            <div class="logo-row">
                <img src="icons/icon48.png" alt="Credify logo" class="logo">
                <div class="header-text">
                    <h1>Credify</h1>
                    <p class="tagline">TLP — Trust Layer Protocol</p>
                </div>
            </div>
        </div>

        <!-- ── Input Section ── -->
        <div class="input-section">
            <textarea id="claim-input" placeholder="Paste or type a claim to verify..." rows="3"></textarea>
            <button id="verify-btn" class="btn-verify">
                <span class="btn-text">Verify Claim</span>
                <span class="btn-loading" style="display:none;">
                    Analyzing...
                </span>
            </button>
        </div>

        <!-- ── Result Section (hidden initially) ── -->
        <div id="result-section" class="result-section" style="display:none;">
            
            <!-- Analyzed Claim -->
            <div class="claim-display">
                <div class="claim-text" id="analyzed-claim">"..."</div>
            </div>

            <!-- Main Result Card -->
            <div class="score-card">
                <div class="score-header">
                    <span class="score-label">Credibility Score</span>
                    <span class="score-value" id="score-value">0%</span>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="score-bar"></div>
                </div>

                <div class="score-footer">
                    <div class="classification-badge" id="classification-badge">Analyzing</div>
                    <div class="confidence-info">
                        <span class="confidence-label">Confidence:</span>
                        <span class="confidence-value" id="confidence-value">0%</span>
                    </div>
                </div>
            </div>

            <!-- Evidence Breakdown -->
            <div class="evidence-summary">
                <h3 class="section-title">Sources Checked</h3>
                <div class="source-list" id="evidence-list">
                    <!-- Source items injected here -->
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button id="toggle-sidebar" class="btn-secondary">View Details</button>
            </div>
        </div>

        <!-- ── Error Section ── -->
        <div id="error-section" class="error-section" style="display:none;">
            <div class="error-message" id="error-message">Verification failed.</div>
            <button class="btn-secondary" id="retry-btn">Retry</button>
        </div>

        <!-- ── Footer ── -->
        <div class="footer">
            Credify analyzes claims using trusted sources
        </div>
    </div>

    <!-- ── Sidebar overlay (Hidden by default) ── -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-branding">
                <img src="icons/icon16.png" alt="Credify logo" class="sidebar-logo">
                <h2>Credify</h2>
            </div>
            <button id="close-sidebar" class="btn-close">✕</button>
        </div>
        <div class="sidebar-content" id="sidebar-content">
            <!-- Source links injected here -->
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
